design: chacha20
scenarios:
  - name: reset_behavior
    description: "Verify that reset clears all outputs and core enters IDLE state"
    assertions:
      - "rst_n_i == 0 |-> ##2 ready_o == 1"
      - "rst_n_i == 0 |-> dout_valid_o == 0"
      - "rst_n_i == 0 |-> block_done_o == 0"
    stimulus:
      - {cycle: 0, rst_n_i: 0}
      - {cycle: 5, rst_n_i: 1}

  - name: single_block_encrypt
    description: "RFC 8439 Section 2.4.2 test vector: encrypt one full block with known key/nonce/counter"
    assertions:
      - "start_i == 1 |-> ##22 block_done_o == 1"
      - "dout_valid_o == 1 for 16 consecutive words after block_done"
    stimulus:
      - {cycle: 10, key_i: "0x000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f", nonce_i: "0x000000090000004a00000000", counter_i: "0x00000001", start_i: 1}
      - {cycle: 11, start_i: 0}
      - {cycle: 32, din_valid_i: 1, din_data_i: "0x4c616469", dout_ready_i: 1}
    notes: "Expected keystream block 0 first word: 0x10f1e7e4 after XOR with 'Ladi'"

  - name: multi_block_counter_increment
    description: "Verify counter auto-increments after each block and produces different keystream"
    assertions:
      - "After first block_done, start second block -> different dout_data_o"
    stimulus:
      - {cycle: 10, key_i: "0x000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f", nonce_i: "0x000000090000004a00000000", counter_i: "0x00000001", start_i: 1}
      - {cycle: 50, start_i: 1}

  - name: backpressure_stall
    description: "Verify output stalls when downstream de-asserts ready"
    assertions:
      - "dout_ready_i == 0 -> word_cnt does not advance, dout_valid_o stays HIGH"
      - "dout_ready_i == 1 -> word_cnt increments"
    stimulus:
      - {cycle: 10, start_i: 1}
      - {cycle: 32, dout_ready_i: 0}
      - {cycle: 35, dout_ready_i: 1}

  - name: rfc8439_full_test_vector
    description: "RFC 8439 Section 2.4.2: Full ChaCha20 encryption of plaintext 'Ladies and Gentlemen of the class of '99'"
    assertions:
      - "All 9 output words match expected ciphertext from RFC 8439"
    stimulus:
      - {cycle: 10, key_i: "0x000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f", nonce_i: "0x000000090000004a00000000", counter_i: "0x00000001", start_i: 1}
    notes: |
      Expected ciphertext (hex): 6e2e359a2568f98041ba0728dd0d6981
      e97e7aec81d2382cf716deb8e0d78dc4f9a3d47d4f2f45b2e9a6e2d
